# ~/Systems/dotfiles/tools/distrobox/distrobox.ini

[dev]
image=registry.fedoraproject.org/fedora:latest
pull=true
pkg_mgr=dnf
additional_packages="golang gh php python3 python3-pip rust cargo git"
init=false
# Pass the shell variable directly to the podman creation environment
additional_flags="--env SHELL=/bin/bash"

[private]
image=docker.io/library/debian:stable
pull=true
pkg_mgr=apt
additional_packages="curl wget ca-certificates xdg-utils zenity"
init=false
additional_flags="--env SHELL=/bin/bash"

[security]
image=docker.io/library/debian:stable
pull=true
pkg_mgr=apt
additional_packages="clamav rkhunter lynis"
init=false
additional_flags="--env SHELL=/bin/bash"

[ai]
image=registry.fedoraproject.org/fedora:latest
pull=true
pkg_mgr=dnf
# OpenCode and Ollama dependencies (Node, Git, build tools for compilation steps)
additional_packages="nodejs npm curl wget git python3 python3-pip"
init=false
additional_flags="--env SHELL=/bin/bash"
# Completely isolates heavy local model caches from your primary home directory
home=~/.local/share/distrobox/ai
